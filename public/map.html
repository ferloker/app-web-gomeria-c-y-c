<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Animated Map</title>
    <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #0f172a; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; filter: invert(95%) hue-rotate(180deg) brightness(85%) contrast(85%); }
        .marker {
            cursor: pointer;
            filter: drop-shadow(0px 4px 4px rgba(0,0,0,0.5)); /* Sombra para el elemento SVG */
            display: flex;
            align-items: flex-end;
            justify-content: center;
        }
        /* OpenFreeMap attribution styling */
        .maplibregl-ctrl-attrib {
            background: rgba(0,0,0,0.5) !important;
        }
    </style>
</head>
<body>
    <div id="map"></div>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const lat = parseFloat(urlParams.get('lat')) || -24.661366060311497;
        const lng = parseFloat(urlParams.get('lng')) || -56.44231702242412;

        // Coordenadas objetivo
        var targetCoord = [lng, lat]; // Lng, Lat
        // Coordenadas de inicio más alejadas y rectas
        var startCoord = [lng, lat + 3.66];

        var map = new maplibregl.Map({
            container: 'map',
            style: 'https://tiles.openfreemap.org/styles/liberty', // Estilo abierto similar a la captura
            center: startCoord,
            zoom: 5,
            pitch: 0,
            bearing: 0,
            interactive: false // deshabilitamos interacción para que parezca un widget
        });

        map.on('load', function () {
            // Marcador personalizado
            var el = document.createElement('div');
            el.className = 'marker';
            el.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="36" height="36" fill="#ea4335" stroke="white" stroke-width="1.5"><path d="M12 2.00003C8.13 2.00003 5 5.13003 5 9.00003C5 14.25 12 22 12 22C12 22 19 14.25 19 9.00003C19 5.13003 15.87 2.00003 12 2.00003ZM12 11.5C10.62 11.5 9.5 10.38 9.5 9.00003C9.5 7.62003 10.62 6.50003 12 6.50003C13.38 6.50003 14.5 7.62003 14.5 9.00003C14.5 10.38 13.38 11.5 12 11.5Z"/></svg>';
            
            new maplibregl.Marker({ element: el, anchor: 'bottom' })
                .setLngLat(targetCoord)
                .addTo(map);

            // Observador para animar el mapa solo cuando el usuario haga scroll hasta él
            var observer = new IntersectionObserver(function(entries) {
                if (entries[0].isIntersecting) {
                    setTimeout(() => {
                        map.flyTo({
                            center: targetCoord,
                            zoom: 16.8,      // Nivel de zoom perfecto para ciudad
                            pitch: 62,       // Inclinación 3D espectacular
                            bearing: 25,     // Rotación leve
                            speed: 0.9,      // Velocidad
                            curve: 1.5,      // Efecto parabólico
                            essential: true
                        });
                    }, 400);
                    observer.disconnect(); // Desactivar para que no suceda más de una vez
                }
            }, { threshold: 0.3 });

            observer.observe(document.getElementById('map'));
        });
    </script>
</body>
</html>
